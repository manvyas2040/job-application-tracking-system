<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile - JATS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h1>🎯 JATS</h1>
            <div class="navbar-menu">
                <div class="navbar-user">
                    <span id="user-email" class="user-badge"></span>
                    <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>

        <div class="auth-wrapper" style="margin-top: 30px;">
            <div class="auth-header">
                <h1>📝 Complete Your Profile</h1>
                <p>Please fill in your details to continue</p>
            </div>

            <div class="auth-form active">
                <div class="error-message" id="profile-error" style="display:none;"></div>
                <div class="success-message" id="profile-success" style="display:none;"></div>

                <form onsubmit="createProfile(event)">
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" required placeholder="+1234567890" pattern="[+]?[0-9]{10,15}">
                    </div>

                    <div class="form-group">
                        <label>Skills *</label>
                        <textarea id="skills" rows="3" required placeholder="e.g., JavaScript, Python, React, SQL"></textarea>
                        <small style="color: var(--secondary);">Separate skills with commas</small>
                    </div>

                    <div class="form-group">
                        <label>Years of Experience *</label>
                        <input type="number" id="experience" required min="0" max="50" placeholder="0">
                    </div>

                    <div class="form-group">
                        <label>Resume Path</label>
                        <input type="text" id="resume" placeholder="/resumes/john-doe.pdf or URL">
                        <small style="color: var(--secondary);">Enter file path or URL to your resume</small>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        Create Profile
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();

        const user = getUser();
        if (user.role !== 'candidate') {
            alert('Only candidates need to create a profile');
            window.location.href = 'dashboard.html';
        }

        document.getElementById('user-email').textContent = user.email;

        async function createProfile(event) {
            event.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const skills = document.getElementById('skills').value;
            const experience = parseInt(document.getElementById('experience').value);
            const resume = document.getElementById('resume').value;

            hideError('profile-error');
            document.getElementById('profile-success').style.display = 'none';
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').textContent = 'Creating...';

            try {
                await apiCall('/candidate/profile', {
                    method: 'POST',
                    body: JSON.stringify({
                        phone,
                        skills,
                        experience_years: experience,
                        resume_path: resume || null
                    })
                });

                // Mark profile as complete
                const updatedUser = { ...user, profile_complete: true };
                setUser(updatedUser);

                showSuccess('profile-success', 'Profile created successfully! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } catch (error) {
                showError('profile-error', error.message);
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('submit-btn').textContent = 'Create Profile';
            }
        }
    </script>
</body>
</html>
