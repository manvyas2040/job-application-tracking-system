<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JATS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h1>🎯 IT Company</h1>
            <div class="navbar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="jobs.html">Jobs</a>
                <a href="applications.html" id="nav-applications">Applications</a>
                <a href="profile.html" id="nav-profile" style="display:none;">Profile</a>
                <a href="notifications.html" id="nav-notifications" style="display:none;">
                    🔔 Notifications <span id="notification-badge" class="badge" style="display:none; background:red; color:white; font-size:0.7rem; padding:2px 6px; border-radius:10px; margin-left:5px;">0</span>
                </a>
                <a href="interviews.html" id="nav-interviews" style="display:none;">Interviews</a>
                <a href="change-password.html">🔐 Change Password</a>
                <a href="users.html" id="nav-users" style="display:none;">Users</a>
                <a href="audit-logs.html" id="nav-audit" style="display:none;">Audit Logs</a>
                <div class="navbar-user">
                    <span id="user-email" class="user-badge"></span>
                    <span id="user-role" class="user-badge"></span>
                    <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>

        <div class="dashboard">
            <h2>Welcome Back!</h2>
            <p style="color: var(--secondary); margin-bottom: 30px;">Here's an overview of your activity</p>

            <div id="stats-grid" class="stats-grid">
                <div class="stat-card">
                    <h3 id="total-jobs">0</h3>
                    <p>Total Jobs</p>
                </div>
                <div class="stat-card green">
                    <h3 id="total-applications">0</h3>
                    <p>My Applications</p>
                </div>
                <div class="stat-card orange">
                    <h3 id="total-interviews">0</h3>
                    <p>Interviews</p>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <h3>Quick Actions</h3>
                <div style="display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="window.location.href='jobs.html'">
                        Browse Jobs
                    </button>
                    <button class="btn btn-secondary" onclick="window.location.href='applications.html'">
                        View Applications
                    </button>
                    <button id="create-job-btn" class="btn btn-success" onclick="window.location.href='jobs.html'" style="display:none;">
                        Create New Job
                    </button>
                </div>
            </div>

            <div style="margin-top: 40px;">
                <h3>Recent Jobs</h3>
                <div id="recent-jobs" class="jobs-grid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();
        checkCandidateProfile(); // Check if candidate needs to complete profile

        const user = getUser();
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-role').textContent = user.role;

        // Load notification count
        loadNotificationCount();

        // Show/hide navigation based on role
        if (user.role === 'candidate') {
            document.getElementById('nav-profile').style.display = 'inline-block';
            document.getElementById('nav-notifications').style.display = 'inline-block';
        }
        if (user.role === 'hr' || user.role === 'admin' || user.role === 'interviewer') {
            document.getElementById('nav-interviews').style.display = 'inline-block';
        }
        if (user.role === 'admin') {
            document.getElementById('nav-users').style.display = 'inline-block';
            document.getElementById('nav-audit').style.display = 'inline-block';
        }

        // Show create job button for HR and Admin
        if (user.role === 'hr' || user.role === 'admin') {
            document.getElementById('create-job-btn').style.display = 'inline-block';
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Load jobs count
                const jobsData = await apiCall('/jobs');
                document.getElementById('total-jobs').textContent = jobsData.total || jobsData.items?.length || 0;

                // Load applications count
                const applications = await apiCall('/applications');
                document.getElementById('total-applications').textContent = applications.length || 0;

                // Load recent jobs
                const recentJobs = jobsData.items?.slice(0, 3) || [];
                const jobsContainer = document.getElementById('recent-jobs');
                
                if (recentJobs.length === 0) {
                    jobsContainer.innerHTML = '<p style="text-align:center;padding:20px;color:#64748b;">No recent jobs</p>';
                } else {
                    jobsContainer.innerHTML = recentJobs.map(job => `
                        <div class="job-card" onclick="window.location.href='job-detail.html?id=${job.job_id}'">
                            <h3>${job.job_title}</h3>
                            <p>${job.job_description.substring(0, 100)}...</p>
                            <div class="job-meta">
                                <span class="badge badge-${job.job_status}">${job.job_status}</span>
                                <span class="badge badge-draft">${job.department}</span>
                            </div>
                        </div>
                    `).join('');
                }

                // For now, set interviews to 0 (would need interview endpoint)
                document.getElementById('total-interviews').textContent = '0';
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
