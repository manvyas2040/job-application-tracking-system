<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - JATS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h1>🎯 JATS</h1>
            <div class="navbar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="profile.html">Profile</a>
                <div class="navbar-user">
                    <span id="user-email" class="user-badge"></span>
                    <span id="user-role" class="user-badge"></span>
                    <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>

        <div class="auth-wrapper" style="margin-top: 30px;">
            <div class="auth-header">
                <h1>🔐 Change Password</h1>
                <p>Update your password regularly for security</p>
            </div>

            <div class="auth-form active">
                <div class="error-message" id="password-error" style="display:none;"></div>
                <div class="success-message" id="password-success" style="display:none;"></div>

                <form onsubmit="changePassword(event)">
                    <div class="form-group">
                        <label>Current Password *</label>
                        <input type="password" id="current-password" required placeholder="Enter your current password">
                    </div>

                    <div class="form-group">
                        <label>New Password *</label>
                        <input type="password" id="new-password" required placeholder="Enter your new password" minlength="6">
                        <small style="color: var(--secondary);">Must be at least 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password *</label>
                        <input type="password" id="confirm-password" required placeholder="Confirm your new password" minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        Change Password
                    </button>
                </form>

                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                    <p style="color: var(--secondary); font-size: 0.9rem;">
                        💡 <strong>Tip:</strong> Use a strong password with uppercase, lowercase, numbers, and symbols.
                    </p>
                    <p style="color: var(--secondary); font-size: 0.9rem;">
                        ⚠️ <strong>Note:</strong> You will need to login again after changing your password.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();

        const user = getUser();
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-role').textContent = user.role;

        async function changePassword(event) {
            event.preventDefault();

            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            hideError('password-error');
            document.getElementById('password-success').style.display = 'none';

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showError('password-error', 'New passwords do not match');
                return;
            }

            // Validate not same as current
            if (newPassword === currentPassword) {
                showError('password-error', 'New password must be different from current password');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Changing Password...';

            try {
                await apiCall('/auth/change-password', {
                    method: 'POST',
                    body: JSON.stringify({
                        old_password: currentPassword,
                        new_password: newPassword
                    })
                });

                showSuccess('password-success', 'Password changed successfully! Redirecting to login...');
                
                // Clear form
                document.querySelector('form').reset();

                // Logout and redirect after 3 seconds
                setTimeout(() => {
                    logout();
                }, 3000);
            } catch (error) {
                showError('password-error', error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Change Password';
            }
        }
    </script>
</body>
</html>
